name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [gh-pages]
  release:
    types: [published]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: typst-community/setup-typst@v4
      - uses: actions/setup-go@v6
        with:
          cache: false
      - run: go install github.com/tdewolff/minify/v2/cmd/minify@v2.24.7
      - run: |
          make html
          minify --recursive --inplace matthew/_site/
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v4
        with:
          path: matthew/_site
      - uses: actions/upload-artifact@v4
        with:
          name: site
          path: matthew/_site

  deploy-github-pages:
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: release
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

